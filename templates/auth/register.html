{% extends 'base.html' %}

{% block title %}Registrarse — CS50 Shop{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="auth-card">
      <h2>Crear cuenta</h2>
      <form method="POST">
        <div class="mb-3">
          <label for="username" class="form-label">Usuario</label>
          <input type="text" id="username" name="username" class="form-control"
                 placeholder="Elige un nombre de usuario"
                 required autofocus autocomplete="username"
                 value="{{ request.form.get('username', '') }}">
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="tu@email.com"
                 required autocomplete="email"
                 value="{{ request.form.get('email', '') }}">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="Mínimo 8 caracteres"
                 required autocomplete="new-password" minlength="8">
        </div>
        <div class="mb-4">
          <label for="confirm_password" class="form-label">Confirmar contraseña</label>
          <input type="password" id="confirm_password" name="confirm_password"
                 class="form-control"
                 placeholder="Repite tu contraseña"
                 required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-dark w-100 py-2">Crear cuenta</button>
      </form>
      <div class="auth-divider">o</div>
      <p class="text-center mb-0" style="font-size: 0.875rem; color: var(--warm-gray);">
        ¿Ya tienes cuenta?
        <a href="{{ url_for('auth.login') }}" style="color: var(--espresso); font-weight: 600;">Inicia sesión</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
